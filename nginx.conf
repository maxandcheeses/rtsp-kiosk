server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;

    location = / {
        try_files /index.html =404;
    }

    # Public sanitised configs — safe to serve
    location = /streams.json {
        try_files /streams.json =404;
        add_header Cache-Control "no-cache";
    }

    location = /views.json {
        try_files /views.json =404;
        add_header Cache-Control "no-cache";
    }

    # Reload trigger file — browser polls this, reload if timestamp changes
    location = /reload-check {
        try_files /reload-trigger =404;
        add_header Cache-Control "no-cache";
    }

    # Block direct access to any other json files
    location ~* \.json$ {
        return 403;
    }

    # Cache bundled/static JS
    location ~* \.js$ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        try_files $uri =404;
    }
}