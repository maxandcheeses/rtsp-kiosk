server {
    listen 80;
    server_name _;

    # nginx:alpine's envsubst renders templates from
    # /etc/nginx/templates/ → /usr/share/nginx/html/ on startup
    root /usr/share/nginx/html;

    location = / {
        try_files /index.html =404;
    }

    location / {
        try_files $uri =404;
    }
}