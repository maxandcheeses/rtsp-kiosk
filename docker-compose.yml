services:

  # ── STUN server ──────────────────────────────────────────────────────────
  stun:
    image: coturn/coturn:latest
    container_name: rtsp-kiosk-stun
    restart: unless-stopped
    ports:
      - "${STUN_PORT:-3478}:${STUN_PORT:-3478}/udp"
      - "${STUN_PORT:-3478}:${STUN_PORT:-3478}/tcp"
    command: >
      -n
      --no-auth
      --no-cli
      --no-tls
      --no-dtls
      --stun-only
      --listening-port=${STUN_PORT:-3478}
      --listening-ip=0.0.0.0
      --external-ip=${HOST_IP}

  # ── MediaMTX ─────────────────────────────────────────────────────────────
  mediamtx:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mediamtx
    restart: unless-stopped
    ports:
      - "8554:8554"         # RTSP TCP
      - "8000:8000/udp"     # RTSP UDP/RTP
      - "8001:8001/udp"     # RTSP UDP/RTCP
      - "8889:8889"         # WebRTC/WHEP HTTP
      - "8189:8189/udp"     # WebRTC ICE/UDP
      - "9997:9997"         # API
    depends_on:
      - stun
    environment:
      HOST_IP: "${HOST_IP}"
      STUN_PORT: "${STUN_PORT:-3478}"
    volumes:
      - ./data:/data

  # ── Nginx: serves the RTSP Kiosk UI + streams.json ───────────────────────
  nginx:
    image: nginx:alpine
    container_name: rtsp-kiosk-ui
    restart: unless-stopped
    ports:
      - "80:80"
    environment:
      FORCE_LAYOUT: ""
      FULLSCREEN_TIMEOUT: "30"
    entrypoint: >
      /bin/sh -c "envsubst '$$FORCE_LAYOUT $$FULLSCREEN_TIMEOUT' < /templates/index.html > /usr/share/nginx/html/index.html
      && nginx -g 'daemon off;'"
    volumes:
      - ./www/index.html:/templates/index.html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./data/streams.json:/usr/share/nginx/html/streams.json:ro
    depends_on:
      - mediamtx